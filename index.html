<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Calendar</title>

<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
}


header{
  position:sticky;
  top:0;
  background:#0f172a;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:10;
}

#companyFilter{
  padding:10px;
  border-radius:10px;
  background:#1f2937;
  color:#fff;
  border:none;
  width:220px;
}


button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

input {
  font-size:16px;
  -webkit-text-size-adjust: 100%;
}

.export{background:#3b82f6;color:#fff}
.import{background:#f59e0b;color:#111;margin-left:8px}


#calendar{padding:12px}

.month{
  background:rgba(255,255,255,.06);
  margin-bottom:16px;
  padding:12px;
  border-radius:14px;
}


.weekdays{
  display:grid;
  grid-template-columns:40px repeat(7,1fr);
  font-size:10px;
  color:#94a3b8;
  margin-bottom:6px;
  text-align:center;
}


.week-row{
  display:grid;
  grid-template-columns:40px repeat(7,1fr);
  gap:6px;
  margin-bottom:6px;
  align-items:stretch;
}

.week-number{
  font-size:11px;
  color:#94a3b8;
  text-align:center;
  padding-top:10px;
}


.day{
  min-height:80px;
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:6px;
  cursor:pointer;
  touch-action:manipulation;
}

.day-number{
  font-weight:700;
  font-size:12px;
}

.entry{
  font-size:.65rem;
  margin-top:3px;
  padding:2px 6px;
  border-radius:999px;
  color:#111;
  font-weight:700;
}


#summary{
  position:sticky;
  bottom:0;
  background:#0f172a;
  padding:12px;
  border-top:1px solid rgba(255,255,255,.1);
}

.summary-item{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
}

.summary-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.summary-toggle{
    width:36px;
    height:36px;
    border:none;
    border-radius:50%;
    background:#1e293b;
    color:#fff;
    cursor:pointer;
    font-size:18px;
    font-weight:bold;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.25s;
    box-shadow:0 2px 8px rgba(0,0,0,.35);
}

.summary-toggle:hover{
    background:#334155;
}

.summary-toggle.open{
    transform:rotate(180deg);
}

#summaryContent{
    overflow:hidden;
    max-height:500px;
    transition:max-height .3s ease;
}

#summaryContent.closed{
    max-height:0;
}

.footer{
  text-align:center;
  margin-top:12px;
  font-size:12px;
  color:#888;
}

.badge{
  width:10px;height:10px;border-radius:50%;
  display:inline-block;margin-right:6px;
}


#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:16px;
}

.modal-content{
  background:#111827;
  padding:20px;
  border-radius:16px;
  width:100%;
  max-width:420px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0 10px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <h1>📅 Work Calendar</h1>

  <select id="companyFilter" onchange="setFilter(this.value)">
    <option value="">All Companies</option>
  </select>

  <div>
    <button class="export" onclick="exportExcel()">Export</button>
    <button class="import" onclick="document.getElementById('file').click()">Import</button>
    <input type="file" id="file" hidden onchange="importExcel(event)">
  </div>
</header>

<div id="calendar"></div>

<div id="summary">
    <div class="summary-header">
        <h3>Total Hours</h3>
        <button id="toggleSummary" class="summary-toggle">⌃</button>
    </div>
    <div id="summaryContent">
        <div id="summaryList"></div>
        <div class="footer">
            © <span id="year"></span> Work Calendar App - LM | Built with ❤️
        </div>
    </div>
</div>

<div id="modal">
  <div class="modal-content">
    <h3 id="modalDate"></h3>

    <label>Company</label>
    <input id="placeInput">

    <label>Start</label>
    <input id="startInput" type="time">

    <label>End</label>
    <input id="endInput" type="time">

    <button onclick="saveEntry()" style="background:#22c55e;color:#fff">Add</button>
    <div id="entryList" style="margin:10px 0"></div>
    <button onclick="closeModal()" style="background:#334155;color:#fff">Close</button>
  </div>
</div>

<script>

let data = JSON.parse(localStorage.getItem("work-data") || "{}");
let selectedDate="";
let filter="";


function save(){
  localStorage.setItem("work-data", JSON.stringify(data));
}


function setFilter(v){
  filter=v;
  render();
  closeModal();
}


function color(p){
  let h=0;
  for(let i=0;i<p.length;i++) h=p.charCodeAt(i)+((h<<5)-h);
  return `hsl(${Math.abs(h)%360} 70% 60%)`;
}


function hours(s,e){
  const [sh,sm]=s.split(":").map(Number);
  const [eh,em]=e.split(":").map(Number);
  return Math.max(0,(eh*60+em)-(sh*60+sm))/60;
}


function getWeekNumber(d){
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return Math.ceil((((d - yearStart) / 86400000) + 1)/7);
}


function getToday(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}


function openModal(date){
  selectedDate=date;

  document.getElementById("modal").style.display="flex";
  document.getElementById("modalDate").textContent=date;

  document.getElementById("placeInput").value="";
  document.getElementById("startInput").value="";
  document.getElementById("endInput").value="";
  const list=document.getElementById("entryList");
  list.innerHTML=(data[date]||[]).map((e,i)=>`<div style="display:flex;justify-content:space-between;margin:4px 0"><span>${e.place} ${e.start}-${e.end}</span><button onclick="deleteEntry(${i})" style="background:#ef4444;color:#fff">Delete</button></div>`).join("");
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}


function attachTap(cell,date){
  let x=0,y=0;

  cell.addEventListener("touchstart",(e)=>{
    const t=e.touches[0];
    x=t.clientX; y=t.clientY;
  },{passive:true});

  cell.addEventListener("touchend",(e)=>{
    const t=e.changedTouches[0];
    if(Math.abs(t.clientX-x)>10 || Math.abs(t.clientY-y)>10) return;
    openModal(date);
  },{passive:true});

  cell.addEventListener("click",()=>openModal(date));
}


function saveEntry(){
  const place=document.getElementById("placeInput").value.trim();
  const start=document.getElementById("startInput").value;
  const end=document.getElementById("endInput").value;

  if(!place||!start||!end) return alert("Fill all fields");

  if(!data[selectedDate]) data[selectedDate]=[];

  data[selectedDate].push({
    place,start,end,
    hours:hours(start,end)
  });

  save();
  updateFilter();
  render();
  closeModal();
}



function deleteEntry(index){
 if(!data[selectedDate]) return;
 data[selectedDate].splice(index,1);
 if(data[selectedDate].length===0) delete data[selectedDate];
 save();updateFilter();render();openModal(selectedDate);
}

function deleteDay(){
  delete data[selectedDate];
  save();
  updateFilter();
  render();
  closeModal();
}


function updateFilter(){
  const sel=document.getElementById("companyFilter");
  const set=new Set();

  Object.values(data).forEach(arr=>{
    arr.forEach(e=>set.add(e.place));
  });

  const cur=sel.value;
  sel.innerHTML=`<option value="">All Companies</option>`;

  [...set].sort().forEach(c=>{
    const o=document.createElement("option");
    o.value=c;
    o.textContent=c;
    sel.appendChild(o);
  });

  sel.value=cur;
}


function importExcel(e){
  const file=e.target.files[0];
  const reader=new FileReader();

  reader.onload=(ev)=>{
    const wb=XLSX.read(ev.target.result,{type:"binary"});
    const sheet=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(sheet);

    data={};

    rows.forEach(r=>{
      const d=r.Date;
      if(!data[d]) data[d]=[];

      data[d].push({
        place:r.Company,
        start:r.Start,
        end:r.End,
        hours:Number(r.Hours)||hours(r.Start,r.End)
      });
    });

    save();
    updateFilter();
    render();
  };

  reader.readAsBinaryString(file);
}


function exportExcel(){
  const wb=XLSX.utils.book_new();
  const grouped={};

  Object.entries(data).forEach(([date,arr])=>{
    arr.forEach(e=>{
      if(!grouped[e.place]) grouped[e.place]=[];
      grouped[e.place].push({
        Date:date,
        Company:e.place,
        Start:e.start,
        End:e.end,
        Hours:e.hours
      });
    });
  });

  const all=[];
  Object.values(grouped).forEach(v=>all.push(...v));

  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(all),"All");

  Object.entries(grouped).forEach(([k,v])=>{
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(v),k.slice(0,31));
  });

  XLSX.writeFile(wb,"work-hours.xlsx");
}


function render(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  const year=new Date().getFullYear();
  const today=getToday();

  for(let m=0;m<12;m++){
    const month=new Date(year,m,1);

    const box=document.createElement("div");
    box.className="month";

    const title=document.createElement("h3");
    title.textContent=month.toLocaleString("default",{month:"long",year:"numeric"});
    box.appendChild(title);

    const start=(month.getDay()+6)%7;
    const days=new Date(year,m+1,0).getDate();

    let weekRow=document.createElement("div");
    weekRow.className="weekdays";
    weekRow.innerHTML="<div></div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>";
    box.appendChild(weekRow);

    let grid=document.createElement("div");
    let dayCounter=1;

    while(dayCounter<=days){

      let row=document.createElement("div");
      row.className="week-row";

      const dateObj = new Date(year,m,dayCounter);
      const weekNum = getWeekNumber(dateObj);

      let w=document.createElement("div");
      w.className="week-number";
      w.textContent=weekNum;
      row.appendChild(w);

      for(let i=0;i<7;i++){
        const currentDate=new Date(year,m,dayCounter);

        const cell=document.createElement("div");
        cell.className="day";

        if(i<start && dayCounter===1){
          cell.style.visibility="hidden";
        } else if(dayCounter<=days){

          const dateStr=`${year}-${String(m+1).padStart(2,"0")}-${String(dayCounter).padStart(2,"0")}`;
          
          if(dateStr === today){
            cell.style.border = "2px solid #22c55e";
            cell.style.background = "rgba(34,197,94,0.15)";
          }

          attachTap(cell,dateStr);

          const num=document.createElement("div");
          num.className="day-number";
          num.textContent=dayCounter;
          cell.appendChild(num);

          (data[dateStr]||[])
            .filter(e=>!filter || e.place===filter)
            .forEach(e=>{
              const div=document.createElement("div");
              div.className="entry";
              div.style.background=color(e.place);
              div.textContent=`${e.place} ${e.start}-${e.end}`;
              cell.appendChild(div);
            });

          dayCounter++;
        }

        row.appendChild(cell);
      }

      grid.appendChild(row);
    }

    box.appendChild(grid);
    cal.appendChild(box);
  }

  renderSummary();
}


function renderSummary(){
  const totals={};

  Object.values(data).forEach(arr=>{
    arr.forEach(e=>{
      if(filter && e.place!==filter) return;
      totals[e.place]=(totals[e.place]||0)+e.hours;
    });
  });

  const list=document.getElementById("summaryList");
  list.innerHTML="";

  Object.entries(totals).forEach(([k,v])=>{
    const div=document.createElement("div");
    div.className="summary-item";
    div.innerHTML=`<div><span class="badge" style="background:${color(k)}"></span>${k}</div><strong>${v.toFixed(1)}h</strong>`;
    list.appendChild(div);
  });
}

const toggleBtn = document.getElementById("toggleSummary");
const summaryContent = document.getElementById("summaryContent");

toggleBtn.addEventListener("click", () => {
    summaryContent.classList.toggle("closed");
    toggleBtn.classList.toggle("open");
});

updateFilter();
render();

</script>
</body>
</html>
